<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>中医药智能翻译</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>


    <div class="container">

        <!-- 左侧配置区 -->
        <div class="sidebar">

            <div class="sidebar-title">中医药智能翻译平台</div>

            <!-- 模型配置 -->
            <div class="section">
                <h3>模型配置</h3>
                <label>接口地址</label>
                <input type="text" id="base_url" placeholder="https://api.deepseek.com/v1">
                <label>API Key</label>
                <input type="password" id="api_key" placeholder="sk-...">
                <label>模型ID</label>
                <input type="text" id="model_id" placeholder="deepseek-chat">
                <label>Temperature: <span id="temp_val">0.3</span></label>
                <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.3"
                    oninput="document.getElementById('temp_val').innerText=this.value">
                <label style="color:#888;font-size:11px">配置将自动保存在本地</label>
            </div>

            <!-- 提示词设置 -->
            <div class="section">
                <h3>提示词设置</h3>
                <textarea id="custom_prompt" rows="4" placeholder="留空则使用默认中医药翻译提示词"></textarea>
            </div>

            <!-- 术语管理 -->
            <div class="section">
                <h3>术语管理</h3>
                <label>
                    <input type="checkbox" id="use_who" checked>
                    启用内置WHO标准术语表
                </label>
                <input type="text" id="new_source" placeholder="源语言术语（如：气虚）">
                <input type="text" id="new_target" placeholder="目标语言译文（如：Qi deficiency）">
                <button onclick="addTerm()">添加术语</button>
                <div style="margin-top:12px">
                    <label style="font-size:13px;color:#666">上传CSV术语表</label>
                    <input type="file" id="csv_file" accept=".csv" style="width:100%;margin-top:4px;font-size:12px">
                    <div id="csv_term_info" style="font-size:12px;margin-top:4px"></div>
                </div>
                <div id="term_list"></div>
            </div>

        </div>

        <!-- 右侧翻译区 -->
        <div class="main">

            <!-- 翻译方向 + 按钮 -->
            <div class="direction-bar">
                <select id="direction">
                    <option value="zh2en">中文 → 英文</option>
                    <option value="en2zh">英文 → 中文</option>
                </select>
                <button id="translate_btn" onclick="translateText()">翻译</button>
            </div>

            <!-- 文本翻译 -->
            <div class="text-area-row">
                <!-- 输入框 -->
                <textarea id="input_text" placeholder="请输入待翻译文本..."></textarea>

                <!-- 输出区域 -->
                <div class="output-wrapper">
                    <div id="output_display" class="output-display" placeholder="译文将在此处显示..."></div>
                    <textarea id="output_text" style="display:none" readonly></textarea>
                    <button class="copy-btn" onclick="copyTranslation()" id="copy_btn">复制译文</button>
                </div>
            </div>

            <!-- 命中术语 -->
            <div id="glossary_hits" class="hits-box" style="display:none">
                <strong>命中术语：</strong>
                <span id="hits_content"></span>
            </div>

            <!-- 文件翻译 -->
            <div class="section file-translate-section">
                <h3 style="color:#2c4a2e;margin-bottom:12px">文件翻译</h3>

                <!-- 上传区域 -->
                <div class="file-upload-area" id="file_upload_area"
                    onclick="document.getElementById('translate_file').click()" ondragover="handleDragOver(event)"
                    ondrop="handleDrop(event)">
                    <!-- 上传图标 SVG -->
                    <img src="/static/icons/upload.png" width="40" height="40" style="opacity:0.7" alt="上传">
                    <span class="upload-main-text">点击上传或拖拽文件到此处</span>
                    <span class="upload-sub-text">支持 .docx 和 .txt 格式</span>
                    <!-- 选中文件后显示文件名 -->
                    <span id="file_name_display" class="upload-file-name" style="display:none"></span>
                </div>
                <input type="file" id="translate_file" accept=".docx,.txt" style="display:none"
                    onchange="handleFileSelect(this)">

                <!-- 进度/日志区域 -->
                <div id="file_log_area" class="file-log-area" style="display:none">
                    <!-- 加载条 -->
                    <div id="progress_bar_wrap" class="progress-bar-wrap" style="display:none">
                        <div class="progress-bar-inner" id="progress_bar_inner"></div>
                    </div>
                    <!-- 日志文字 -->
                    <div id="file_log_text" class="file-log-text"></div>
                    <!-- 结果提示 -->
                    <div id="file_result_text" class="file-result-text" style="display:none"></div>
                </div>

                <!-- 按钮区域：翻译和下载分开 -->
                <div class="file-btn-row">
                    <button id="file_translate_btn" onclick="translateFile()" class="file-action-btn translate-btn">
                        ▶ 开始翻译
                    </button>
                    <!-- 下载按钮默认禁用，翻译完成后才激活 -->
                    <button id="file_download_btn" onclick="downloadFile()" class="file-action-btn download-btn"
                        disabled>
                        ↓ 下载译文
                    </button>
                </div>
            </div>

            <!-- 翻译历史 -->
            <div class="history-section">
                <div class="history-header">
                    <h3>翻译历史</h3>
                    <button class="clear-btn" onclick="clearHistory()">清空历史</button>
                </div>
                <div id="history_list"></div>
            </div>

        </div>
    </div>

    <script src="/static/main.js"></script>
</body>

</html>
